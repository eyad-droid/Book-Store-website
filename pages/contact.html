<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Store | Page Name</title>
    <link rel="stylesheet" href="../css/style.css"> 
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: url(../assets/images/);
            background-size: cover;
            background-attachment: fixed;
        }



        header {
            background-color: #333;
            color: #fff;
            padding: 2px;
            text-align: center;
        }

        nav {
            background-color: rgb(231, 231, 196);
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            padding: 10px;
        }

        .pages {
            display: inline-block;
            padding: 3px 5px;
            text-decoration: none;
            color: #a20909;
            font-weight: bold;
            border: 1px solid #333;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .pages:hover {
            background-color: #ffffff !important;
            color: #651ff0;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            flex: 1;
        }

        .contact-form {
            background: white;
            width: 350px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .contact-form h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .contact-form label {
            display: block;
            margin-top: 10px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .contact-form button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #d7900b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-form button:hover {
            background: #218838;
        }

        footer {
            background-color: #505050;
            color: #fff;
            padding: 1px 0px;
            line-height: 0.3;
            font-size: small;
            text-align: center;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Book Store</h1>
        <nav>
            <a href="pages/login.html" class="pages">Login</a>
            <a href="index.html" class="pages">Home</a>
            <a href="pages/books.html" class="pages">Books</a>
            <a href="pages/gallery.html" class="pages">Gallery </a>
            <a href="pages/gen-info.html" class="pages">General Information</a>
            <a href="pages/writers.html" class="pages">Popular Writers</a>
            <a href="pages/cart.html" class="pages">view cartoons</a>
            <a href="pages/contact.html" class="pages">Contact as</a>
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>
        <form class="contact-form">
            <label for="fname">First Name </label>
            <input type="text" id="fname" placeholder="e.g., Yassin" required>

            <label for="Lname">Last Name </label>
            <input type="text" id="Lname" placeholder="e.g., mansour" required>

            <label for="email">Email </label>
            <input type="email" id="email" placeholder="example@email.com" required>

            <label for="phone">Phone Number </label>
            <input type="text" id="phone" placeholder="e.g., 123-456-7890" required>

            <label for="Recommendations">Recommendations</label>
            <textarea id="Recommendations" rows="5" placeholder="Enter your recommendations here" required></textarea>

            <button class="submit-button" type="submit">Submit</button>
        </form>
    </main>

    <footer>
        <p style="text-align: center">© 2026 Online Library | IT final project</p>
        <p style="text-align: left">
            created by : Eyad , Marwan , Yassen , Abdulrahman , Nour , Marwan ,
            Ahmed , Mahmoud .
        </p>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
